# Minimal golangci-lint config for Go 1.24 compatibility.
# Staticcheck SA1019 (deprecated symbols) and SA1006 (printf/print style) are
# pre-existing upstream rot in the Flow SDK and Google KMS bindings — disabling
# them here until a dependency-upgrade sprint resolves the underlying APIs.
linters:
  disable-all: true
  enable:
    - govet
    - ineffassign
    - unused

linters-settings: {}

run:
  timeout: 3m
