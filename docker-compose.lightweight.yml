version: "3.9"

networks:
  private:

volumes:
  emulator-persist:
  wallet-data:

services:
  swagger-ui:
    image: swaggerapi/swagger-ui
    ports:
      - "8081:8080"
    environment:
      SWAGGER_JSON: /openapi.yml
      # Configuraciones funcionales que mejoran la experiencia
      DEEP_LINKING: "true"
      DISPLAY_OPERATION_ID: "true"
      DEFAULT_MODELS_EXPAND_DEPTH: 1
      DEFAULT_MODEL_EXPAND_DEPTH: 1
      DISPLAY_REQUEST_DURATION: "true"
      DOC_EXPANSION: "list"
      FILTER: "true"
      SHOW_EXTENSIONS: "true"
      SHOW_COMMON_EXTENSIONS: "true"
      TRY_IT_OUT_ENABLED: "true"
    volumes:
      - ./openapi.yml:/openapi.yml
    networks:
      - private

  emulator:
    image: gcr.io/flow-container-registry/emulator:latest
    command: emulator --persist
    volumes:
      - emulator-persist:/flowdb
    env_file:
      - ./.env
    ports:
      - "3569:3569"
    environment:
      FLOW_SERVICEPRIVATEKEY: ${FLOW_WALLET_ADMIN_PRIVATE_KEY}
      FLOW_SERVICEKEYSIGALGO: ECDSA_P256
      FLOW_SERVICEKEYHASHALGO: SHA3_256
      FLOW_DBPATH: /flowdb
    networks:
      - private


  api:
    build:
      context: .
      dockerfile: ./docker/wallet/Dockerfile
      target: dist
      network: host
    networks:
      - private
    ports:
      - "3000:3000"
    volumes:
      - wallet-data:/app/data
    env_file:
      - ./.env
    environment:
      FLOW_WALLET_LIGHTWEIGHT_MODE: "true"
      FLOW_WALLET_ACCESS_API_HOST: emulator:3569
      FLOW_WALLET_CHAIN_ID: flow-emulator
      # Cambiamos la ruta de la base de datos para que sea accesible
      FLOW_WALLET_DATABASE_DSN: "/app/data/wallet.db"
    # Añadimos un comando para asegurarnos de que el directorio existe y esperamos a que el emulador esté listo
    command: sh -c "mkdir -p /app/data && sleep 5 && /main"
    depends_on:
      - emulator
    restart: on-failure:3